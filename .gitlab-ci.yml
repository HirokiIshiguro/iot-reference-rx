# iot-reference-rx CI/CD Pipeline
# Phase 8a: CK-RX65N (V1) — ビルド → フラッシュ → テスト自動化
#
# Runner requirements:
#   - Tag: run_ishiguro_machine (Shell executor on Windows, pwsh)
#   - Tag: hw-ck-rx65n-v1 (CK-RX65N V1 board connected)
#   - E2 emulator Lite + UART port available
#   - Ethernet: board connected to LAN with internet access

stages:
  - build
  - flash
  - provision
  - test

# --- Variables ---
variables:
  # Windows 260文字パス長制限の回避 (FreeRTOS-Cellular-Interface 等)
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: "core.longpaths"
  GIT_CONFIG_VALUE_0: "true"

  # e2studio headless build
  E2STUDIO_CLI: "C:/Renesas/e2_studio_2025_12/eclipse/e2studio-cli.exe"
  E2STUDIO_WORKSPACE: "C:/Temp/e2ws_iot_ref"

  # CC-RX compiler
  CCRX_PATH: "C:/Renesas/RX/3_7_0/bin"

  # Projects
  APP_PROJECT: "aws_ether_ck_rx65n_v2"
  APP_PROJECT_DIR: "Projects/aws_ether_ck_rx65n_v2/e2studio_ccrx"
  BL_PROJECT: "boot_loader_ck_rx65n_v2"
  BL_PROJECT_DIR: "Projects/boot_loader_ck_rx65n_v2/e2studio_ccrx"

  # Flash tool (Renesas Flash Programmer V3.22)
  RFP_CLI: "C:/Program Files (x86)/Renesas Electronics/Programming Tools/Renesas Flash Programmer V3.22/rfp-cli.exe"
  # E2 Lite serial — set E2L_SERIAL_CK_RX65N_J14 in /oss group CI/CD Variables
  # J14 = USB DEBUG connector on CK-RX65N V1
  # Run: rfp-cli -d RX65x -t e2l -if fine -list-tools  to find available S/Ns
  E2L_SERIAL: "${E2L_SERIAL_CK_RX65N_J14}"
  RFP_SPEED: "500K"
  RFP_AUTH: "FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF"

  # UART — set UART_PORT_CK_RX65N_J20 in /oss group CI/CD Variables
  # J20 = USB SER connector on CK-RX65N V1
  UART_PORT: "${UART_PORT_CK_RX65N_J20}"
  UART_BAUD: "115200"

  # AWS IoT Core — set in project-level CI/CD Variables
  # (NOT /oss group level — credentials must stay project-scoped)
  # DO NOT re-declare here — self-referencing variables cause GitLab
  # to produce literal "${VAR}" instead of expanding them.
  # Required project-level CI/CD Variables:
  #   AWS_IOT_ENDPOINT   — AWS IoT Core endpoint URL
  #   AWS_IOT_THING_NAME — Thing name (e.g., ck-rx65n-01)
  #   AWS_IOT_CERT       — Device certificate (File type)
  #   AWS_IOT_PRIVKEY    — Device private key (File type)
  # Optional project-level CI/CD Variables:
  #   OTA_SIGNING_KEY    — OTA code signing private key (File type, PEM)
  #                        If unset, the repository test key is used for
  #                        development-only image generation.

  # Ethernet MAC address (rewrite FreeRTOSConfig.h before build)
  # Set MAC_ADDR_CK_RX65N in /oss group CI/CD Variables
  MAC_ADDR: "${MAC_ADDR_CK_RX65N}"

  # Test flags
  RUN_OTA_TEST: "false"

  # OTA test (manual Step 7-5)
  # These defaults match the validated 2026-03-08 happy path and can be
  # overridden per project/runner if the AWS environment changes.
  AWS_DEFAULT_REGION: "ap-northeast-1"
  OTA_S3_BUCKET: "rx65n-ota"
  OTA_SERVICE_ROLE_ARN: "arn:aws:iam::094025684215:role/rx72n-ota-service-role"
  OTA_SIGNING_PROFILE: "rx65n_ota_profile_testkey"
  OTA_CANDIDATE_VERSION: "0.9.3"
  OTA_OBSERVE_TIMEOUT: "180"
  E2STUDIO_WORKSPACE_OTA: "C:/Temp/e2ws_iot_ref_ota"

# Disable MR pipelines — branch pipeline only
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
      when: never
    - if: $CI_COMMIT_BRANCH
      when: always

# --- Build Stage ---
build:
  stage: build
  tags:
    - run_ishiguro_machine
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - Write-Host "=== Build $env:APP_PROJECT and $env:BL_PROJECT ==="
    # MAC address rewrite (using hardware-config script)
    - |
      if ($env:MAC_ADDR) {
        Write-Host "=== Set MAC address: $env:MAC_ADDR ==="
        $hcDir = "C:\tmp\hardware-config"
        if (-not (Test-Path "$hcDir\scripts\set_mac_address.py")) {
          if (Test-Path $hcDir) { Remove-Item -Recurse -Force $hcDir }
          git clone --depth 1 "$env:CI_SERVER_URL/oss/infra/hardware-config.git" $hcDir
        }
        python "$hcDir\scripts\set_mac_address.py" --mac $env:MAC_ADDR `
          "$env:CI_PROJECT_DIR\$env:APP_PROJECT_DIR\src\frtos_config\FreeRTOSConfig.h"
      } else {
        Write-Host "[WARN] MAC_ADDR not set, using source default"
      }
    # Verify submodules
    - if (-not (Test-Path "Middleware\FreeRTOS\FreeRTOS-Kernel\include\FreeRTOS.h")) { Write-Error "submodules not initialized"; exit 1 }
    # Clean workspace
    - if (Test-Path $env:E2STUDIO_WORKSPACE) { Remove-Item -Recurse -Force $env:E2STUDIO_WORKSPACE }
    # Import and build both projects
    - |
      & "$env:E2STUDIO_CLI" -nosplash `
        -application org.eclipse.cdt.managedbuilder.core.headlessbuild `
        -data "$env:E2STUDIO_WORKSPACE" `
        -import "$env:CI_PROJECT_DIR\$env:APP_PROJECT_DIR" `
        -import "$env:CI_PROJECT_DIR\$env:BL_PROJECT_DIR" `
        -cleanBuild "boot_loader_ck_rx65n_v2/HardwareDebug" `
        -cleanBuild "aws_ether_ck_rx65n_v2/HardwareDebug" `
        -no-indexer
    # Verify outputs
    - if (-not (Test-Path "$env:APP_PROJECT_DIR\HardwareDebug\aws_ether_ck_rx65n_v2.mot")) { Write-Error "app .mot missing"; exit 1 }
    - if (-not (Test-Path "$env:BL_PROJECT_DIR\HardwareDebug\boot_loader_ck_rx65n_v2.mot")) { Write-Error "bootloader .mot missing"; exit 1 }
    - Write-Host "BUILD SUCCESS"
    # Generate combined .mot (boot_loader + app) and .rsu (signed app for OTA)
    # See R01AN7662JJ0100 Section 4.2.3(3)
    # image-gen.py with -ibp generates .mot only; without -ibp generates .rsu only
    - Write-Host "=== Generate initial firmware (userprog.mot + userprog.rsu) ==="
    - pip install pycryptodome cryptography --quiet
    - |
      $env:OTA_SIGNING_KEY_PATH = $env:OTA_SIGNING_KEY
      if (-not $env:OTA_SIGNING_KEY_PATH) {
        $env:OTA_SIGNING_KEY_PATH = "$env:CI_PROJECT_DIR\tools\test_keys\secp256r1.privatekey"
        Write-Host "[WARN] OTA_SIGNING_KEY not set, using repository test key (development only)"
      } else {
        Write-Host "Using OTA_SIGNING_KEY from CI/CD Variables"
      }
      if (-not (Test-Path $env:OTA_SIGNING_KEY_PATH)) {
        Write-Error "OTA signing key not found: $env:OTA_SIGNING_KEY_PATH"
        exit 1
      }
      $env:OTA_CODE_SIGN_CERT_PATH = "$env:CI_PROJECT_DIR\userprog_codesign_cert.pem"
      python tools/generate_signer_cert.py `
        --key $env:OTA_SIGNING_KEY_PATH `
        --out $env:OTA_CODE_SIGN_CERT_PATH
      if (-not (Test-Path $env:OTA_CODE_SIGN_CERT_PATH)) {
        Write-Error "code signing certificate generation failed"
        exit 1
      }
    # (1) Generate userprog.mot — combined boot_loader + app for initial programming
    - |
      python "$env:CI_PROJECT_DIR\$env:BL_PROJECT_DIR\src\smc_gen\r_fwup\tool\image-gen.py" `
        -iup "$env:CI_PROJECT_DIR\$env:APP_PROJECT_DIR\HardwareDebug\aws_ether_ck_rx65n_v2.mot" `
        -ip "$env:CI_PROJECT_DIR\$env:BL_PROJECT_DIR\src\smc_gen\r_fwup\tool\RX65N_DualBank_ImageGenerator_PRM.csv" `
        -o "$env:CI_PROJECT_DIR\userprog" `
        -ibp "$env:CI_PROJECT_DIR\$env:BL_PROJECT_DIR\HardwareDebug\boot_loader_ck_rx65n_v2.mot" `
        -key "$env:OTA_SIGNING_KEY_PATH" `
        -vt ecdsa -ff RTOS
    - if (-not (Test-Path "$env:CI_PROJECT_DIR\userprog.mot")) { Write-Error "userprog.mot generation failed"; exit 1 }
    # (2) Generate userprog.rsu — signed app image for OTA update
    - |
      python "$env:CI_PROJECT_DIR\$env:BL_PROJECT_DIR\src\smc_gen\r_fwup\tool\image-gen.py" `
        -iup "$env:CI_PROJECT_DIR\$env:APP_PROJECT_DIR\HardwareDebug\aws_ether_ck_rx65n_v2.mot" `
        -ip "$env:CI_PROJECT_DIR\$env:BL_PROJECT_DIR\src\smc_gen\r_fwup\tool\RX65N_DualBank_ImageGenerator_PRM.csv" `
        -o "$env:CI_PROJECT_DIR\userprog" `
        -key "$env:OTA_SIGNING_KEY_PATH" `
        -vt ecdsa -ff RTOS
    - if (-not (Test-Path "$env:CI_PROJECT_DIR\userprog.rsu")) { Write-Error "userprog.rsu generation failed"; exit 1 }
    - Write-Host "Image generation SUCCESS"
  artifacts:
    paths:
      - "${APP_PROJECT_DIR}/HardwareDebug/*.mot"
      - "${BL_PROJECT_DIR}/HardwareDebug/*.mot"
      - userprog.mot
      - userprog.rsu
      - userprog_codesign_cert.pem
    expire_in: 7 days

# --- Flash Stage ---
# Combined boot_loader + app write using userprog.mot from image-gen.py
# See R01AN7662JJ0100 Section 4.2.3
flash:
  stage: flash
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - build
  script:
    - Write-Host "=== Flash initial firmware (boot_loader + app) ==="
    # Verify E2L_SERIAL is configured
    - if (-not $env:E2L_SERIAL) { Write-Error "E2L_SERIAL not set. Configure in CI/CD Variables"; exit 1 }
    # Verify userprog.mot exists (combined image from build artifacts)
    - if (-not (Test-Path "userprog.mot")) { Write-Error "userprog.mot not found"; exit 1 }
    # Step 1: Erase chip (resets BANKSEL, clears all flash including data flash)
    - Write-Host "Erasing chip..."
    - |
      & "$env:RFP_CLI" -d RX65x -t "e2l:$env:E2L_SERIAL" -if fine -s $env:RFP_SPEED `
        -auth id $env:RFP_AUTH `
        -erase-chip -noquery
    # Step 2: Write combined boot_loader + app
    - Write-Host "Writing userprog.mot..."
    - |
      & "$env:RFP_CLI" -d RX65x -t "e2l:$env:E2L_SERIAL" -if fine -s $env:RFP_SPEED `
        -auth id $env:RFP_AUTH `
        -p "$env:CI_PROJECT_DIR\userprog.mot" `
        -run -noquery
    - Write-Host "FLASH SUCCESS"

# --- Provision Stage ---
provision:
  stage: provision
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - flash
    - build    # need userprog.mot artifact for rfp-cli reset
  script:
    - Write-Host "=== Provision AWS IoT credentials ==="
    # Verify required variables
    - if (-not $env:AWS_IOT_THING_NAME) { Write-Error "AWS_IOT_THING_NAME not set"; exit 1 }
    - if (-not $env:AWS_IOT_ENDPOINT) { Write-Error "AWS_IOT_ENDPOINT not set"; exit 1 }
    # AWS_IOT_CERT and AWS_IOT_PRIVKEY are File-type CI/CD Variables
    # GitLab expands them to temporary file paths at runtime
    - if (-not $env:AWS_IOT_CERT) { Write-Error "AWS_IOT_CERT not set"; exit 1 }
    - if (-not $env:AWS_IOT_PRIVKEY) { Write-Error "AWS_IOT_PRIVKEY not set"; exit 1 }
    - if (-not (Test-Path "$env:CI_PROJECT_DIR\userprog_codesign_cert.pem")) { Write-Error "userprog_codesign_cert.pem not found"; exit 1 }
    # Install pyserial if needed
    - pip install pyserial --quiet
    # Run provisioning script with an external reset command so the script
    # itself catches the CLI boot window immediately after reset.
    - |
      $resetCmd = '"{0}" -d RX65x -t "e2l:{1}" -if fine -s {2} -auth id {3} -v "{4}\userprog.mot" -run -noquery' -f `
        $env:RFP_CLI, $env:E2L_SERIAL, $env:RFP_SPEED, $env:RFP_AUTH, $env:CI_PROJECT_DIR
      python tools/provision.py `
        --port $env:UART_PORT --baud $env:UART_BAUD `
        --thing-name $env:AWS_IOT_THING_NAME `
        --endpoint $env:AWS_IOT_ENDPOINT `
        --cert $env:AWS_IOT_CERT `
        --key $env:AWS_IOT_PRIVKEY `
        --code-sign-cert "$env:CI_PROJECT_DIR\userprog_codesign_cert.pem" `
        --format `
        --reset-cmd $resetCmd
  allow_failure: true

# --- Test Stage ---
test_mqtt:
  stage: test
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - flash
    - build
    - job: provision
      optional: true    # test_mqtt can run without provision (manual trigger)
  script:
    - Write-Host "=== MQTT PubSub Test ==="
    # Install pyserial if needed
    - pip install pyserial --quiet
    # Diagnostic: list available COM ports (helps identify if UART_PORT is correct)
    - Write-Host "--- Available COM ports ---"
    - python -m serial.tools.list_ports -v
    - Write-Host "--- UART_PORT=$env:UART_PORT ---"
    # Monitor UART for MQTT success markers.
    # test_mqtt.py uses --reset-cmd to:
    #   1. Close serial port (avoid USB handle issues during rfp-cli)
    #   2. rfp-cli verify + run to reset the target without re-writing flash
    #   3. Open serial port immediately after reset
    #   4. Send 'CLI' to enter CLI mode during boot window (~10s)
    #   5. Send 'reset' for clean reboot with UART output enabled
    #   6. Monitor for MQTT success markers
    # This must happen within the same job to catch the 10-second CLI boot window.
    - |
      $resetCmd = '"{0}" -d RX65x -t "e2l:{1}" -if fine -s {2} -auth id {3} -v "{4}\userprog.mot" -run -noquery' -f `
        $env:RFP_CLI, $env:E2L_SERIAL, $env:RFP_SPEED, $env:RFP_AUTH, $env:CI_PROJECT_DIR
      python tools/test_mqtt.py `
        --port $env:UART_PORT --baud $env:UART_BAUD `
        --timeout 120 `
        --reset-cmd $resetCmd
  allow_failure: true

test_ota:
  stage: test
  timeout: 45 min
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - build
    - test_mqtt
  script:
    - Write-Host "=== OTA Update Test (manual live run) ==="
    - pip install pyserial pycryptodome cryptography --quiet
    - |
      $artifactDir = "$env:CI_PROJECT_DIR\artifacts\test_ota"
      New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
      New-Item -ItemType Directory -Force -Path "$artifactDir\candidate" | Out-Null

      if (-not $env:AWS_IOT_THING_NAME) { Write-Error "AWS_IOT_THING_NAME not set"; exit 1 }
      if (-not $env:OTA_S3_BUCKET) { Write-Error "OTA_S3_BUCKET not set"; exit 1 }
      if (-not $env:OTA_SERVICE_ROLE_ARN) { Write-Error "OTA_SERVICE_ROLE_ARN not set"; exit 1 }
      if (-not $env:OTA_SIGNING_PROFILE) { Write-Error "OTA_SIGNING_PROFILE not set"; exit 1 }
      if (-not $env:E2L_SERIAL) { Write-Error "E2L_SERIAL not set"; exit 1 }
      if (-not (Test-Path "$env:CI_PROJECT_DIR\userprog.mot")) { Write-Error "userprog.mot not found"; exit 1 }

      $meta = [ordered]@{
        step = "step7-5"
        started_at_utc = (Get-Date).ToUniversalTime().ToString("o")
        commit_sha = $env:CI_COMMIT_SHA
        job_id = $env:CI_JOB_ID
        pipeline_id = $env:CI_PIPELINE_ID
        uart_port = $env:UART_PORT
        uart_baud = $env:UART_BAUD
        ota_candidate_version = $env:OTA_CANDIDATE_VERSION
        ota_bucket = $env:OTA_S3_BUCKET
        ota_signing_profile = $env:OTA_SIGNING_PROFILE
        ota_service_role_arn = $env:OTA_SERVICE_ROLE_ARN
        planned_runtime_outputs = @(
          "candidate\*.rsu",
          "candidate\*_codesign_cert.pem",
          "build_ota_candidate.log",
          "create_ota_console.log",
          "create_ota_input.json",
          "create_ota_output.json",
          "ota_s3_put_output.json",
          "ota_update_status.json",
          "signing_job.json",
          "ota_uart_raw.log",
          "ota_summary.json",
          "test_ota_console.log",
          "job_execution.json"
        )
        generated_now = @(
          "ci_job_meta.json",
          "serial_ports.txt",
          "create_ota_help.txt",
          "README.txt"
        )
        note = "Step 7-5 manual job builds a higher OTA candidate, creates an AWS IoT OTA job, and observes the live UART sequence."
      }

      $readmeLines = @(
        'Manual OTA artifacts:',
        '- candidate\*.rsu: OTA candidate image built with a higher app version than baseline',
        '- candidate\*_codesign_cert.pem: public certificate generated from the OTA signing key used for the candidate build',
        '- build_ota_candidate.log: candidate build transcript',
        '- create_ota_input.json: input used for aws iot create-ota-update',
        '- create_ota_output.json: create-ota-update response',
        '- ota_s3_put_output.json: uploaded S3 object metadata',
        '- ota_update_status.json: final get-ota-update payload after CREATE_COMPLETE/FAILED',
        '- signing_job.json: aws signer describe-signing-job output',
        '- ota_job_meta.json: OTA update ID / job ID / S3 object metadata from tools/create_ota_update.py',
        '- ota_uart_raw.log: per-line UTC + relative timestamps from tools/test_ota.py --raw-log',
        '- ota_summary.json: success/classification/marker summary from tools/test_ota.py --summary-json',
        '- test_ota_console.log: stdout/stderr from the live UART observer',
        '- job_execution.json: aws iot describe-job-execution output after observation',
        '- serial_ports.txt: serial port inventory captured before the test',
        '- ci_job_meta.json: CI job metadata and start/end timestamps'
      )
      $readmeLines | Set-Content -Encoding UTF8 "$artifactDir\README.txt"

      python tools/create_ota_update.py --help 2>&1 | Tee-Object -FilePath "$artifactDir\create_ota_help.txt"
      python -m serial.tools.list_ports -v 2>&1 | Tee-Object -FilePath "$artifactDir\serial_ports.txt"

      $env:OTA_SIGNING_KEY_PATH = $env:OTA_SIGNING_KEY
      if (-not $env:OTA_SIGNING_KEY_PATH) {
        $env:OTA_SIGNING_KEY_PATH = "$env:CI_PROJECT_DIR\tools\test_keys\secp256r1.privatekey"
        Write-Host "[WARN] OTA_SIGNING_KEY not set, using repository test key (development only)"
      } elseif (-not (Test-Path $env:OTA_SIGNING_KEY_PATH)) {
        Write-Error "OTA signing key not found: $env:OTA_SIGNING_KEY_PATH"
        exit 1
      }

      $candidateVersionUnderscore = $env:OTA_CANDIDATE_VERSION -replace '\.', '_'
      $candidatePrefix = "$artifactDir\candidate\$env:AWS_IOT_THING_NAME" + "_" + $candidateVersionUnderscore
      $candidateCodeSignCert = "$artifactDir\candidate\$env:AWS_IOT_THING_NAME" + "_codesign_cert.pem"
      python tools/build_ota_candidate.py `
        --repo-root $env:CI_PROJECT_DIR `
        --version $env:OTA_CANDIDATE_VERSION `
        --output-prefix $candidatePrefix `
        --signing-key $env:OTA_SIGNING_KEY_PATH `
        --e2studio-cli $env:E2STUDIO_CLI `
        --workspace $env:E2STUDIO_WORKSPACE_OTA `
        --code-sign-cert-out $candidateCodeSignCert `
        2>&1 | Tee-Object -FilePath "$artifactDir\build_ota_candidate.log"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      $candidateRsu = "$candidatePrefix.rsu"
      if (-not (Test-Path $candidateRsu)) {
        Write-Error "OTA candidate .rsu missing: $candidateRsu"
        exit 1
      }

      python tools/create_ota_update.py `
        --artifact-dir $artifactDir `
        --thing-name $env:AWS_IOT_THING_NAME `
        --input-rsu $candidateRsu `
        --file-version $env:OTA_CANDIDATE_VERSION `
        --bucket $env:OTA_S3_BUCKET `
        --signing-profile $env:OTA_SIGNING_PROFILE `
        --role-arn $env:OTA_SERVICE_ROLE_ARN `
        --region $env:AWS_DEFAULT_REGION `
        2>&1 | Tee-Object -FilePath "$artifactDir\create_ota_console.log"
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      $resetCmd = '"{0}" -d RX65x -t "e2l:{1}" -if fine -s {2} -auth id {3} -v "{4}\userprog.mot" -run -noquery' -f `
        $env:RFP_CLI, $env:E2L_SERIAL, $env:RFP_SPEED, $env:RFP_AUTH, $env:CI_PROJECT_DIR

      $testOtaExit = 0
      python tools/test_ota.py `
        --port $env:UART_PORT --baud $env:UART_BAUD `
        --timeout $env:OTA_OBSERVE_TIMEOUT `
        --expected-version $env:OTA_CANDIDATE_VERSION `
        --reset-cmd $resetCmd `
        --raw-log "$artifactDir\ota_uart_raw.log" `
        --summary-json "$artifactDir\ota_summary.json" `
        2>&1 | Tee-Object -FilePath "$artifactDir\test_ota_console.log"
      if ($LASTEXITCODE -ne 0) { $testOtaExit = $LASTEXITCODE }

      $otaMetaPath = "$artifactDir\ota_job_meta.json"
      if (Test-Path $otaMetaPath) {
        $otaMeta = Get-Content $otaMetaPath | ConvertFrom-Json
        if ($otaMeta.aws_iot_job_id) {
          aws iot describe-job-execution `
            --job-id $otaMeta.aws_iot_job_id `
            --thing-name $env:AWS_IOT_THING_NAME `
            --region $env:AWS_DEFAULT_REGION `
            --output json `
            2>&1 | Tee-Object -FilePath "$artifactDir\job_execution.json"
        }
      }

      $meta.ended_at_utc = (Get-Date).ToUniversalTime().ToString("o")
      $meta | ConvertTo-Json -Depth 4 | Set-Content -Encoding UTF8 "$artifactDir\ci_job_meta.json"
      if ($testOtaExit -ne 0) { exit $testOtaExit }
    - Write-Host "Observability artifacts prepared in artifacts/test_ota"
  rules:
    - if: $RUN_OTA_TEST == "true"
      when: always
    - when: manual
  artifacts:
    when: always
    paths:
      - artifacts/test_ota/
    expire_in: 7 days
  allow_failure: true  # Remove after Step 7 is complete
