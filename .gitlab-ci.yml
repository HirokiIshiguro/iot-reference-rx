# iot-reference-rx CI/CD Pipeline
# Phase 8a: CK-RX65N (V1) — ビルド → フラッシュ → テスト自動化
#
# Runner requirements:
#   - Tag: run_ishiguro_machine (Shell executor on Windows)
#   - Tag: hw-ck-rx65n-v1 (CK-RX65N V1 board connected)
#   - E2 emulator Lite + UART port available
#   - Ethernet: board connected to LAN with internet access

stages:
  - build
  - flash
  - test

# --- Variables ---
variables:
  # e2studio headless build
  E2STUDIO_CLI: "C:/Renesas/e2_studio_2025_12/eclipse/e2studio-cli.exe"
  E2STUDIO_WORKSPACE: "%TEMP%/e2ws_iot_ref"

  # CC-RX compiler
  CCRX_PATH: "C:/Renesas/RX/3_7_0/bin"

  # Projects
  APP_PROJECT: "aws_ether_ck_rx65n_v2"
  APP_PROJECT_DIR: "Projects/aws_ether_ck_rx65n_v2/e2studio_ccrx"
  BL_PROJECT: "boot_loader_ck_rx65n_v2"
  BL_PROJECT_DIR: "Projects/boot_loader_ck_rx65n_v2/e2studio_ccrx"

  # Flash tool (Renesas Flash Programmer V3.22)
  RFP_CLI: "C:/Program Files (x86)/Renesas Electronics/Programming Tools/Renesas Flash Programmer V3.22/rfp-cli.exe"
  # E2 Lite serial — set E2L_SERIAL_CK_RX65N_J14 in /oss group CI/CD Variables
  # J14 = USB DEBUG connector on CK-RX65N V1
  # Run: rfp-cli -d RX65x -t e2l -if fine -list-tools  to find available S/Ns
  E2L_SERIAL: "${E2L_SERIAL_CK_RX65N_J14}"
  RFP_SPEED: "500K"
  RFP_AUTH: "FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFF"

  # UART — set UART_PORT_CK_RX65N_J20 in /oss group CI/CD Variables
  # J20 = USB SER connector on CK-RX65N V1
  UART_PORT: "${UART_PORT_CK_RX65N_J20}"
  UART_BAUD: "115200"

  # AWS IoT Core
  # TODO: Update after AWS setup (Step 5)
  AWS_IOT_ENDPOINT: "TBD"
  AWS_IOT_THING_NAME: "ck-rx65n-01"

  # Test flags
  RUN_AWS_TESTS: "false"
  RUN_OTA_TEST: "false"

# Disable MR pipelines — branch pipeline only
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
      when: never
    - if: $CI_COMMIT_BRANCH
      when: always

# --- Build Stage ---
build:
  stage: build
  tags:
    - run_ishiguro_machine
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - echo "=== Build ${APP_PROJECT} and ${BL_PROJECT} ==="
    # Verify submodules
    - if not exist "Middleware\FreeRTOS\FreeRTOS-Kernel\include\FreeRTOS.h" (echo ERROR - submodules not initialized && exit /b 1)
    # Clean workspace
    - if exist "%E2STUDIO_WORKSPACE%" rmdir /s /q "%E2STUDIO_WORKSPACE%"
    # Import and build both projects
    - >-
      "%E2STUDIO_CLI%" -nosplash
      -application org.eclipse.cdt.managedbuilder.core.headlessbuild
      -data "%E2STUDIO_WORKSPACE%"
      -import "%CD%\%APP_PROJECT_DIR%"
      -import "%CD%\%BL_PROJECT_DIR%"
      -cleanBuild "boot_loader_ck_rx65n_v2/HardwareDebug"
      -cleanBuild "aws_ether_ck_rx65n_v2/HardwareDebug"
      -no-indexer
    # Verify outputs
    - if not exist "%APP_PROJECT_DIR%\HardwareDebug\aws_ether_ck_rx65n_v2.mot" (echo ERROR - app .mot missing && exit /b 1)
    - if not exist "%BL_PROJECT_DIR%\HardwareDebug\boot_loader_ck_rx65n_v2.mot" (echo ERROR - bootloader .mot missing && exit /b 1)
    - echo "BUILD SUCCESS"
  artifacts:
    paths:
      - "${APP_PROJECT_DIR}/HardwareDebug/*.mot"
      - "${BL_PROJECT_DIR}/HardwareDebug/*.mot"
    expire_in: 7 days

# --- Flash Stage ---
flash_boot_loader:
  stage: flash
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - build
  script:
    - echo "=== Flash boot_loader ==="
    # Verify E2L_SERIAL is configured
    - if "%E2L_SERIAL%"=="" (echo ERROR - E2L_SERIAL not set. Configure in CI/CD Variables && exit /b 1)
    # Verify .mot file exists (from build artifacts)
    - if not exist "%BL_PROJECT_DIR%\HardwareDebug\boot_loader_ck_rx65n_v2.mot" (echo ERROR - boot_loader .mot not found && exit /b 1)
    # Step 1: Erase chip (resets BANKSEL, clears all flash including data flash)
    - echo "Erasing chip..."
    - >-
      "%RFP_CLI%" -d RX65x -t "e2l:%E2L_SERIAL%" -if fine -s %RFP_SPEED%
      -auth id %RFP_AUTH%
      -erase-chip -noquery
    # Step 2: Write boot_loader
    - echo "Writing boot_loader..."
    - >-
      "%RFP_CLI%" -d RX65x -t "e2l:%E2L_SERIAL%" -if fine -s %RFP_SPEED%
      -auth id %RFP_AUTH%
      -p "%CD%\%BL_PROJECT_DIR%\HardwareDebug\boot_loader_ck_rx65n_v2.mot"
      -run -noquery
    - echo "FLASH BOOT_LOADER SUCCESS"
  rules:
    - when: manual
  allow_failure: true

flash_app:
  stage: flash
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - flash_boot_loader
  script:
    - echo "=== Flash ${APP_PROJECT} ==="
    # Verify E2L_SERIAL is configured
    - if "%E2L_SERIAL%"=="" (echo ERROR - E2L_SERIAL not set. Configure in CI/CD Variables && exit /b 1)
    # Verify .mot file exists (from build artifacts)
    - if not exist "%APP_PROJECT_DIR%\HardwareDebug\aws_ether_ck_rx65n_v2.mot" (echo ERROR - app .mot not found && exit /b 1)
    # Write app (no erase — preserves boot_loader region)
    - echo "Writing app (noerase)..."
    - >-
      "%RFP_CLI%" -d RX65x -t "e2l:%E2L_SERIAL%" -if fine -s %RFP_SPEED%
      -auth id %RFP_AUTH%
      -file "%CD%\%APP_PROJECT_DIR%\HardwareDebug\aws_ether_ck_rx65n_v2.mot"
      -auto -noerase -run -noquery
    - echo "FLASH APP SUCCESS"
  rules:
    - when: manual
  allow_failure: true

# --- Test Stage ---
test_mqtt:
  stage: test
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - flash_app
  script:
    - echo "=== MQTT PubSub Test ==="
    - echo "TODO - Implement MQTT connectivity test (Step 6)"
  rules:
    - if: $RUN_AWS_TESTS == "true"
      when: always
    - when: manual
  allow_failure: true  # Remove after Step 6 is complete

test_ota:
  stage: test
  tags:
    - run_ishiguro_machine
    - hw-ck-rx65n-v1
  resource_group: ck-rx65n-device
  needs:
    - test_mqtt
  script:
    - echo "=== OTA Update Test ==="
    - echo "TODO - Implement OTA test (Step 7)"
  rules:
    - if: $RUN_OTA_TEST == "true"
      when: always
    - when: manual
  allow_failure: true  # Remove after Step 7 is complete
