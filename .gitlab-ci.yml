# iot-reference-rx CI/CD Pipeline
# Phase 8a: CK-RX65N (V1) — ビルド → フラッシュ → テスト自動化
#
# Runner requirements:
#   - Tag: run_ishiguro_machine (Shell executor on Windows)
#   - Tag: hw-ck-rx65n-v1 (CK-RX65N V1 board connected)
#   - E2 emulator Lite + UART port available
#   - Ethernet: board connected to LAN with internet access

stages:
  - build
  - flash
  - test

# --- Variables ---
variables:
  # e2studio headless build
  E2STUDIO_CLI: "C:/Renesas/e2_studio_2025_12/eclipse/e2studio-cli.exe"
  E2STUDIO_WORKSPACE: "%TEMP%/e2ws_iot_ref"

  # CC-RX compiler
  CCRX_PATH: "C:/Renesas/RX/3_7_0/bin"

  # Projects
  APP_PROJECT: "aws_ether_ck_rx65n_v2"
  APP_PROJECT_DIR: "Projects/aws_ether_ck_rx65n_v2/e2studio_ccrx"
  BL_PROJECT: "boot_loader_ck_rx65n_v2"
  BL_PROJECT_DIR: "Projects/boot_loader_ck_rx65n_v2/e2studio_ccrx"

  # Flash tool
  RFP_CLI: "C:/Program Files (x86)/Renesas Electronics/Renesas Flash Programmer V3/rfp-cli.exe"
  # TODO: Confirm interface type (FINE / SWD / E2 Lite) after hardware setup

  # UART
  UART_PORT: "COM9"
  UART_BAUD: "115200"

  # AWS IoT Core
  # TODO: Update after AWS setup (Step 5)
  AWS_IOT_ENDPOINT: "TBD"
  AWS_IOT_THING_NAME: "ck-rx65n-01"

  # Test flags
  RUN_AWS_TESTS: "false"
  RUN_OTA_TEST: "false"

# Disable MR pipelines — branch pipeline only
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
      when: never
    - if: $CI_COMMIT_BRANCH
      when: always

# --- Build Stage ---
build:
  stage: build
  tags:
    - run_ishiguro_machine
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - echo "=== Build ${APP_PROJECT} and ${BL_PROJECT} ==="
    # Verify submodules
    - if not exist "Middleware\FreeRTOS\FreeRTOS-Kernel\include\FreeRTOS.h" (echo ERROR - submodules not initialized && exit /b 1)
    # Clean workspace
    - if exist "%E2STUDIO_WORKSPACE%" rmdir /s /q "%E2STUDIO_WORKSPACE%"
    # Import and build both projects
    - >-
      "%E2STUDIO_CLI%" -nosplash
      -application org.eclipse.cdt.managedbuilder.core.headlessbuild
      -data "%E2STUDIO_WORKSPACE%"
      -import "%CD%\%APP_PROJECT_DIR%"
      -import "%CD%\%BL_PROJECT_DIR%"
      -cleanBuild "boot_loader_ck_rx65n_v2/HardwareDebug"
      -cleanBuild "aws_ether_ck_rx65n_v2/HardwareDebug"
      -no-indexer
    # Verify outputs
    - if not exist "%APP_PROJECT_DIR%\HardwareDebug\aws_ether_ck_rx65n_v2.mot" (echo ERROR - app .mot missing && exit /b 1)
    - if not exist "%BL_PROJECT_DIR%\HardwareDebug\boot_loader_ck_rx65n_v2.mot" (echo ERROR - bootloader .mot missing && exit /b 1)
    - echo "BUILD SUCCESS"
  artifacts:
    paths:
      - "${APP_PROJECT_DIR}/HardwareDebug/*.mot"
      - "${BL_PROJECT_DIR}/HardwareDebug/*.mot"
    expire_in: 7 days

